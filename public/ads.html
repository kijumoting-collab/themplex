  <script>
    function filterAds() {
      // Ambil ID dari tanda pagar URL (misal: #pos-a)
      var hash = window.location.hash; 
      if (!hash) return;

      // Cari elemen yang dituju
      var targetEl = document.querySelector(hash);

      if (targetEl) {
        // HAPUS semua posisi iklan lain dari dokumen agar tidak merusak layout
        var allBlocks = document.querySelectorAll('.ad-block');
        allBlocks.forEach(function(block) {
          if ('#' + block.id !== hash) {
            block.remove(); // Hapus total posisi iklan lain dari RAM browser
          }
        });
      }
    }
    // Jalankan fungsi saat halaman dimuat
    window.addEventListener('DOMContentLoaded', filterAds);
  </script>
